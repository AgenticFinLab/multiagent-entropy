# Configuration file for testing the Debate MAS (multi-agent with majority voting)

data:
  data_name: GSM8K
  data_path: EXPERIMENT/data/GSM8K
  # The number of samples to be tested, -1 for all
  data_num: 1
  # The number of samples for one inference
  batch_size: 1

environment:
  dotenv_path: .env
  
lm_name: &lm_name Qwen/Qwen3-0.6B

graph_config:
  recursion_limit: 150

inference_config: &infer
  # Options: "cuda" (NVIDIA), "mps" (Mac), "cpu"
  device: "cuda"
  # Options: "float16", "bfloat16", "float32" (use float32 for CPU/MPS stability if needed)
  torch_dtype: "float16"
  device_map: "auto"

entropy_config: &entropy

# Number of rounds (loops) for the debate system
round: 2

generation_config: &gen
  max_new_tokens: 2000
  do_sample: true
  temperature: 0.6
  top_p: 0.95
  # pad_token_id: 50256

save_folder: "EXPERIMENT/uTEST/EntropyDebate"

agents:
  agent1:
    lm_name: *lm_name
    inference_config: *infer
    entropy_config: *entropy
    generation_config: *gen
    sys_message: "examples.uTEST.prompts:DEBATE_AGENT1_SYS"
    user_message: "examples.uTEST.prompts:DEBATE_AGENT1_USER"

  agent2:
    lm_name: *lm_name
    inference_config: *infer
    entropy_config: *entropy
    generation_config: *gen
    sys_message: "examples.uTEST.prompts:DEBATE_AGENT2_SYS"
    user_message: "examples.uTEST.prompts:DEBATE_AGENT2_USER"

  agent3:
    lm_name: *lm_name
    inference_config: *infer
    entropy_config: *entropy
    generation_config: *gen
    sys_message: "examples.uTEST.prompts:DEBATE_AGENT3_SYS"
    user_message: "examples.uTEST.prompts:DEBATE_AGENT3_USER"
