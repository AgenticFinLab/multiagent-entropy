
# Configuration file for testing the BasicAgent

data:
  data_name: GSM8K
  data_path: EXPERIMENT/data/GSM8K
  # The number of samples to be tested, -1 for all
  data_num: 1
  # The number of samples for one inference
  batch_size: 1

environment:
  dotenv_path: .env
  
# Task type for dynamic prompt loading
# Options: "math", "code", "option"
task_type: "math"
  
lm_name: &lm_name Qwen/Qwen3-0.6B

graph_config:
  recursion_limit: 150

inference_config: &infer
  # Options: "cuda" (NVIDIA), "mps" (Mac), "cpu"
  device: "cuda"
  # Options: "float16", "bfloat16", "float32" (use float32 for CPU/MPS stability if needed)
  torch_dtype: "float16"
  device_map: "auto"

entropy_config: &entropy
  
# Number of rounds for the sequential pipeline
round: 2

# History aggregation configuration
# When true, aggregates all previous round interactions into the next round's prompt
aggregate_history: true

# History aggregation optimization settings
# Maximum number of characters to include in aggregated history (0 for no limit)
max_history_chars: 0

# Maximum number of previous rounds to include in history (0 for all rounds)
max_history_rounds: 0

generation_config: &gen
  max_new_tokens: 2000
  do_sample: true
  temperature: 0.6
  top_p: 0.95
  # pad_token_id: 50256

save_folder: "EXPERIMENT/uTEST/EntropySequential"

agents:
  planner:
    lm_name: *lm_name
    inference_config: *infer
    entropy_config: *entropy
    generation_config: *gen
    sys_message: "examples.uTEST.prompts:PLANNER_SYS"
    user_message: "examples.uTEST.prompts:PLANNER_USER"

  solver:
    lm_name: *lm_name
    inference_config: *infer
    entropy_config: *entropy
    generation_config: *gen
    sys_message: "examples.uTEST.prompts:SOLVER_SYS"
    user_message: "examples.uTEST.prompts:SOLVER_USER"

  critic:
    lm_name: *lm_name
    inference_config: *infer
    entropy_config: *entropy
    generation_config: *gen
    sys_message: "examples.uTEST.prompts:CRITIC_SYS"
    user_message: "examples.uTEST.prompts:CRITIC_USER"

  judger:
    lm_name: *lm_name
    inference_config: *infer
    entropy_config: *entropy
    generation_config: *gen
    sys_message: "examples.uTEST.prompts:JUDGER_SYS"
    user_message: "examples.uTEST.prompts:JUDGER_USER"


