# Base configuration file with common settings shared across experiments

# Agent type configuration
# Available types: single, sequential, centralized, decentralized, full_decentralized, debate, hybrid
# agent_type: "single"

# Number of rounds for single and sequential agents
# Default: 3 rounds
round: 2

# History aggregation configuration
# When true, aggregates all previous round interactions, outputs, and context into the next round's prompt
# Default: false (disabled)
aggregate_history: true

# History aggregation optimization settings
# Maximum number of characters to include in aggregated history (0 for no limit)
# Helps manage memory and token usage
max_history_chars: 10000

# Maximum number of previous rounds to include in history (0 for all rounds)
# Helps limit context window size
max_history_rounds: 0

# Environment settings
environment:
  dotenv_path: .env

# Graph configuration
graph_config:
  recursion_limit: 150

# Generation base configuration
generation_config:
  max_new_tokens: 8192
  do_sample: true
  temperature: 0.6
  top_p: 0.95

# Inference base configuration
inference_config:
  # Options: "cuda" (NVIDIA), "mps" (Mac), "cpu"
  device: "cuda"
  # Options: "float16", "bfloat16", "float32" (use float32 for CPU/MPS stability if needed)
  torch_dtype: "float16"
  # device_map: None forces model to load on the specified device only
  # device_map: "auto" would distribute model across all available GPUs
  device_map: "auto"
  # Enable gradient checkpointing for memory optimization (reduces memory usage at the cost of slightly slower inference)
  use_gradient_checkpointing: true
  
# Entropy base configuration
entropy_config: ""

# Save folder configuration
save_folder: "/experiments/results/raw"
