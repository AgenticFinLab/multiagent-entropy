# Centralized agent mode configuration

agents:
  MathAgent:
    lm_name: "${model_specific.lm_name}"
    inference_config: "${model_specific.inference_config}"
    entropy_config: "${entropy_configs.entropy_config}"
    generation_config: "${base_config.generation_config}"
    sys_message: "maep.prompts:MATH_SYS"
    user_message: "maep.prompts:MATH_USER"

  ScienceAgent:
    lm_name: "${model_specific.lm_name}"
    inference_config: "${model_specific.inference_config}"
    entropy_config: "${entropy_configs.entropy_config}"
    generation_config: "${base_config.generation_config}"
    sys_message: "maep.prompts:SCIENCE_SYS"
    user_message: "maep.prompts:SCIENCE_USER"

  CodeAgent:
    lm_name: "${model_specific.lm_name}"
    inference_config: "${model_specific.inference_config}"
    entropy_config: "${entropy_configs.entropy_config}"
    generation_config: "${base_config.generation_config}"
    sys_message: "maep.prompts:CODE_SYS"
    user_message: "maep.prompts:CODE_USER"

  OrchestratorAgent:
    lm_name: "${model_specific.lm_name}"
    inference_config: "${model_specific.inference_config}"
    entropy_config: "${entropy_configs.entropy_config}"
    generation_config: "${base_config.generation_config}"
    sys_message: "maep.prompts:ORCHESTRATOR_SYS"
    user_message: "maep.prompts:ORCHESTRATOR_USER"
    sys_feedback_message: "maep.prompts:ORCHESTRATOR_FEEDBACK_SYS"
    user_feedback_message: "maep.prompts:ORCHESTRATOR_FEEDBACK_USER"
