# Batch configuration example for running multiple experiments

# List of experiments to run
experiments:
  # Experiment 1: Qwen3-0.6B with GSM8K and single agent
  - name: "qwen3-0.6b_gsm8k_single_agent_round3"
    base_config: "experiments/configs/base_config.yml"
    model_config: "experiments/configs/model_specific/qwen3-0.6b.yml"
    dataset_config: "experiments/configs/dataset_specific/gsm8k.yml"
    entropy_config: "experiments/configs/entropy_configs/standard.yml"
    agent_type: "single"
    
